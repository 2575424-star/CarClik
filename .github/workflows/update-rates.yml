name: Update currency rates

on:
  schedule:
    - cron: '*/30 * * * *'  # Каждые 30 минут
  workflow_dispatch:         # Можно запустить вручную

jobs:
  update-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch USD rates from valuta.kg
        id: usd
        run: |
          # Получаем HTML страницы
          RESPONSE=$(curl -s -L "https://valuta.kg/")
          
          # Парсим курс покупки USD
          BUY=$(echo "$RESPONSE" | grep -oP 'USD[\s\S]{0,100}покупка[\s\S]{0,30}\K\d+\.\d+' | head -1)
          if [ -z "$BUY" ]; then
            BUY=$(echo "$RESPONSE" | grep -oP 'Средний курс[\s\S]{0,300}покупка\s*\|\s*продажа[\s\S]{0,50}\K\d+\.\d+' | head -1)
          fi
          if [ -z "$BUY" ]; then
            BUY="87.40"
          fi
          
          # Парсим курс продажи USD
          SELL=$(echo "$RESPONSE" | grep -oP 'USD[\s\S]{0,100}продажа[\s\S]{0,30}\K\d+\.\d+' | head -1)
          if [ -z "$SELL" ]; then
            SELL=$(echo "$RESPONSE" | grep -oP 'Средний курс[\s\S]{0,300}покупка\s*\|\s*продажа[\s\S]{0,100}\K\d+\.\d+(?=\s*<' | head -1)
          fi
          if [ -z "$SELL" ]; then
            SELL="87.60"
          fi
          
          echo "BUY=$BUY" >> $GITHUB_OUTPUT
          echo "SELL=$SELL" >> $GITHUB_OUTPUT
          echo "USD buy: $BUY, sell: $SELL"

      - name: Fetch RUB rate from abank.kg
        id: rub
        run: |
          RESPONSE=$(curl -s -L "https://abank.kg/ky")
          
          # Ищем курс RUB (Нак эмес, Сатып алуу)
          RATE=$(echo "$RESPONSE" | grep -oP 'Нак эмес[\s\S]{0,500}RUB[\s\S]{0,100}Сатып алуу[\s\S]{0,50}\K\d+\.\d+' | head -1)
          if [ -z "$RATE" ]; then
            # Пробуем вторую таблицу
            RATE=$(echo "$RESPONSE" | grep -oP '(?:<table[^>]*>.*?</table>){2}[\s\S]*?RUB[\s\S]{0,100}Сатып алуу[\s\S]{0,50}\K\d+\.\d+' | head -1)
          fi
          if [ -z "$RATE" ]; then
            RATE=$(echo "$RESPONSE" | grep -oP 'RUB[\s\S]{0,50}Сатып алуу[\s\S]{0,30}\K\d+\.\d+' | head -1)
          fi
          if [ -z "$RATE" ]; then
            RATE="1.1470"
          fi
          
          echo "RATE=$RATE" >> $GITHUB_OUTPUT
          echo "RUB rate: $RATE"

      - name: Create rates JSON
        run: |
          cat > rates.json << EOF
          {
            "usdBuy": ${{ steps.usd.outputs.BUY }},
            "usdSell": ${{ steps.usd.outputs.SELL }},
            "rubToKgs": ${{ steps.rub.outputs.RATE }},
            "lastUpdate": "$(date -Iseconds)"
          }
          EOF
          cat rates.json

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add rates.json
          git diff --staged --quiet || git commit -m "Auto-update currency rates [skip ci]"
          git push
